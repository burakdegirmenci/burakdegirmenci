<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" width="1280" height="280" role="img" aria-label="Burak Değirmenci — E-Commerce Specialist · Builder">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1a1a1a"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="60%" stop-color="#0a0a0a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="280" fill="#0a0a0a"/>
  <rect width="1280" height="280" fill="url(#dots)"/>
  <rect width="900" height="280" fill="url(#fade)"/>

  <rect x="64" y="88" width="3" height="104" fill="#2563EB"/>

  <text x="92" y="138" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, 'Cascadia Mono', 'Segoe UI Mono', 'Roboto Mono', monospace" font-size="44" font-weight="600" fill="#ffffff" letter-spacing="-0.5">Burak Değirmenci</text>

  <text x="92" y="178" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, 'Cascadia Mono', 'Segoe UI Mono', 'Roboto Mono', monospace" font-size="18" font-weight="400" fill="#888888" letter-spacing="0.3">E-Commerce Specialist · Builder</text>

  <g transform="translate(92, 212)" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, 'Cascadia Mono', 'Segoe UI Mono', 'Roboto Mono', monospace" font-size="14">
    <text x="0" y="0" fill="#2563EB">$</text>
    <text x="18" y="0" fill="#e0e0e0">whoami</text>
    <text x="92" y="0" fill="#555555">—</text>
    <text x="112" y="0" fill="#888888">operator who ships</text>
  </g>

  <g transform="translate(1040, 60)">
    <text font-family="ui-monospace, 'SF Mono', Menlo, Monaco, 'Cascadia Mono', 'Segoe UI Mono', 'Roboto Mono', monospace" font-size="14" font-weight="600" fill="#2563EB">
      <tspan x="0" y="0">&lt;/&gt;</tspan>
    </text>
    <g transform="translate(0, 28)" font-family="ui-monospace, monospace" font-size="12" fill="#bbbbbb">
      <text x="0" y="0">01 ship</text>
      <text x="0" y="20">02 iterate</text>
      <text x="0" y="40">03 repeat</text>
    </g>
    <line x1="0" y1="108" x2="160" y2="108" stroke="#333333" stroke-width="1"/>
    <text x="0" y="130" font-family="ui-monospace, monospace" font-size="11" fill="#888888">ideas are cheap</text>
    <text x="0" y="148" font-family="ui-monospace, monospace" font-size="11" fill="#888888">shipping is the craft</text>
  </g>

  <g stroke="#1a1a1a" stroke-width="1" fill="none">
    <line x1="0" y1="40" x2="1280" y2="40"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
  </g>
</svg>
